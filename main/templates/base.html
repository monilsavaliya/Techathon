<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EY Smart Bid Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl flex-shrink-0">
            <div class="h-16 flex items-center justify-center border-b border-gray-700 bg-slate-950">
                <span class="text-lg font-bold tracking-wider text-yellow-400"><i class="fas fa-bolt mr-2"></i>SmartBid.ai</span>
            </div>
            
            <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
                <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-2">Workspace</p>
                <a href="/" class="flex items-center px-3 py-2.5 bg-gray-800 rounded-lg text-white transition hover:bg-yellow-500 hover:text-black">
                    <i class="fas fa-chart-pie w-6"></i> <span class="font-medium">Command Center</span>
                </a>
                <a href="/upload" class="flex items-center px-3 py-2.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                    <i class="fas fa-file-import w-6"></i> <span class="font-medium">Ingest RFP</span>
                </a>

                <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-6">Data Masters</p>
                
                <a href="/manage/client_master" class="flex items-center px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                    <i class="fas fa-building w-6"></i> <span class="font-medium">Clients</span>
                </a>
                <a href="/manage/material_master" class="flex items-center px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                    <i class="fas fa-cubes w-6"></i> <span class="font-medium">Material Pricing</span>
                </a>
                <a href="/manage/product_master" class="flex items-center px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                    <i class="fas fa-tag w-6"></i> <span class="font-medium">Products (SKU)</span>
                </a>
                <a href="/manage/competitors" class="flex items-center px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                    <i class="fas fa-chess w-6"></i> <span class="font-medium">Competitors</span>
                </a>
                <a href="/manage/logistic_master" class="flex items-center px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                    <i class="fas fa-truck w-6"></i> <span class="font-medium">Logistics</span>
                </a>
                <a href="/manage/test_master" class="flex items-center px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                    <i class="fas fa-vial w-6"></i> <span class="font-medium">Testing</span>
                </a>
                <a href="/settings" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                    <i class="fas fa-cogs w-6"></i>
                    <span class="font-medium">Settings</span>
                </a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 border-b border-gray-200">
                <h2 class="text-lg font-bold text-slate-800">{% block header %}Overview{% endblock %}</h2>
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-xs">AU</div>
                </div>
            </header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
